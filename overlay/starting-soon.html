<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klareg — Starting Soon</title>
    <link rel="stylesheet" href="style/base.css?v=9">
    <link rel="stylesheet" href="style/theme-studio.css?v=9">
    <link rel="stylesheet" href="style/widgets.css?v=9">
    <link rel="stylesheet" href="style/animations.css?v=9">
    <link rel="stylesheet" href="style/starting-soon-bg.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600&family=Inter:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <style>
        /* Fake endless init loader */
        .init-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .init-bar {
            position: relative;
            width: 340px;
            height: 1px;
            background: rgba(var(--c-accent-rgb), 0.14);
            overflow: hidden;
        }
        .init-bar-segment {
            position: absolute;
            top: 0; left: 0; height: 100%;
            width: 45%;
            background: linear-gradient(90deg, transparent, var(--c-accent), transparent);
            animation: initBarSlide 1.8s cubic-bezier(0.65,0,0.35,1) infinite;
        }
        @keyframes initBarSlide {
            from { transform: translateX(-100%); }
            to   { transform: translateX(340%); }
        }
        .init-status {
            font-size: 10px;
            color: var(--c-text-muted);
            letter-spacing: 0.22em;
            min-height: 14px;
            transition: opacity 0.35s ease;
        }
        .init-dots {
            display: flex;
            gap: 6px;
        }
        .init-dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--c-accent);
            opacity: 0.25;
            animation: initDotPulse 1.4s ease-in-out infinite;
        }
        .init-dot:nth-child(2) { animation-delay: 0.2s; }
        .init-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes initDotPulse {
            0%, 100% { opacity: 0.20; transform: scale(0.85); }
            50%      { opacity: 1;    transform: scale(1.15); }
        }
    </style>
</head>
<body>
    <div class="obs-frame" id="obs-frame" data-bg-style="aurora">
        <!-- ════ STATIC BASE LAYERS ════ -->
        <div class="bg-grid" style="animation: gridShift 20s linear infinite;"></div>
        <div class="bg-hex"></div>
        <div class="bg-scanlines"></div>
        <div class="bg-dither"></div>
        <div class="bg-vignette"></div>

        <!-- ════ ANIMATED BG VARIANTS (one active via [data-bg-style]) ════ -->
        <div class="bg-anim bg-anim-aurora">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="bg-radar-inner"></div>
            <div class="aurora-particles"></div>
        </div>

        <div class="bg-anim bg-anim-warp">
            <div class="warp-stars"></div>
        </div>

        <div class="bg-anim bg-anim-constellation">
            <canvas id="constellation-canvas"></canvas>
        </div>

        <div class="bg-anim bg-anim-mission">
            <div class="mission-ring mission-ring-1"></div>
            <div class="mission-ring mission-ring-2"></div>
            <div class="mission-ring mission-ring-3"></div>
            <div class="mission-crosshair"></div>
            <div class="mission-scan"></div>
            <div class="mission-telemetry mission-telemetry-tl" id="telemetry-tl"></div>
            <div class="mission-telemetry mission-telemetry-tr" id="telemetry-tr"></div>
            <div class="mission-telemetry mission-telemetry-bl" id="telemetry-bl"></div>
            <div class="mission-telemetry mission-telemetry-br" id="telemetry-br"></div>
        </div>

        <div class="bg-anim bg-anim-synthwave">
            <div class="synth-stars"></div>
            <div class="synth-sun"></div>
            <div class="synth-grid"></div>
        </div>

        <!-- Subtle floating accent glow -->
        <div class="absolute" style="top:30%;left:50%;width:600px;height:300px;background:radial-gradient(ellipse,rgba(91,127,255,0.06),transparent 70%);transform:translate(-50%,-50%);animation:float 8s ease-in-out infinite;pointer-events:none;z-index:2;"></div>

        <!-- ════ FRAME GUIDES ════ -->
        <div class="frame-guides">
            <div class="guide-inner" style="top:48px;bottom:48px;left:64px;right:64px;"></div>
            <div class="guide-v" style="left:30%;"></div>
            <div class="guide-v" style="right:25%;"></div>
            <div class="guide-h" style="top:22%;"></div>
            <div class="guide-h" style="bottom:22%;"></div>
        </div>

        <!-- ════ CONTENT ════ -->
        <div class="absolute inset-0 flex flex-col" style="padding:48px 64px;z-index:20;">

            <!-- ── HEADER ── -->
            <header class="flex items-center justify-between" style="animation:fadeIn 0.8s var(--ease-spring) both;">
                <div class="channel-logo panel panel-accent-top px-6 py-4" style="padding:16px 24px;">
                    <img src="klareg-logo.png" alt="Klareg" style="width:48px;height:48px;object-fit:contain;">
                    <div class="flex flex-col">
                        <span class="channel-logo-sub">Diffusion en direct</span>
                        <span class="channel-logo-name">Klareg</span>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <div class="pulse-dot" style="width:6px;height:6px;border-radius:50%;background:var(--c-accent);animation:livePulse 2s ease-in-out infinite;"></div>
                        <span class="font-display text-muted uppercase" style="font-size:11px;letter-spacing:0.15em;">Système en ligne</span>
                    </div>
                    <div style="width:1px;height:16px;background:var(--c-border);"></div>
                    <div class="airport-clock" id="clock"></div>
                </div>
            </header>

            <!-- ── CENTER ── -->
            <main class="flex flex-col items-center justify-center flex-grow" style="animation:slideUpIn 1s var(--ease-spring) 0.2s both;">

                <h1 id="starting-title" class="font-display" style="font-size:120px;font-weight:500;line-height:1;letter-spacing:-0.02em;color:var(--c-text-bright);text-transform:uppercase;animation:clipRevealH 1.2s var(--ease-spring) 0.5s both;">
                    Lancement imminent
                </h1>

                <span class="font-display text-muted uppercase" style="font-size:14px;letter-spacing:0.2em;margin-top:8px;animation:fadeIn 0.6s var(--ease-spring) 1s both;">
                    Initialisation de la diffusion
                </span>

                <!-- ── FAKE INIT LOADER (endless) ── -->
                <div class="init-loader" style="margin-top:32px;animation:fadeIn 0.6s var(--ease-spring) 1.4s both;">
                    <div class="init-bar"><div class="init-bar-segment"></div></div>
                    <span class="init-status font-mono uppercase" id="init-status">CONNEXION AUX SERVEURS</span>
                    <div class="init-dots">
                        <span class="init-dot"></span>
                        <span class="init-dot"></span>
                        <span class="init-dot"></span>
                    </div>
                </div>
            </main>

            <!-- ── FOOTER ── -->
            <footer class="flex items-end justify-between w-full" style="height:160px;animation:fadeIn 0.8s var(--ease-spring) 0.6s both;">

                <div class="now-playing" style="width:320px;">
                    <div class="np-accent"></div>
                    <div class="np-vinyl">
                        <iconify-icon icon="ph:vinyl-record" width="20" style="color:var(--c-text-muted)"></iconify-icon>
                        <div class="vinyl-spin"></div>
                    </div>
                    <div class="np-info">
                        <span class="np-label">En écoute</span>
                        <div class="np-track" id="now-playing-track">Synthwave Radio &bull; Chill Beats</div>
                    </div>
                </div>

                <div class="ticker-band flex-grow" style="margin:0 24px;height:44px;align-self:flex-end;">
                    <div class="ticker-accent"><iconify-icon icon="ph:rss" width="18"></iconify-icon></div>
                    <div class="ticker-content">
                        <div class="ticker-fade-left"></div>
                        <div class="ticker-fade-right"></div>
                        <div class="ticker-track" id="ticker"></div>
                    </div>
                </div>

                <div class="schedule-block" style="width:320px;">
                    <div class="schedule-header">
                        <span class="schedule-title">Programme du jour</span>
                        <iconify-icon icon="ph:calendar" width="16" style="color:var(--c-text-dim)"></iconify-icon>
                    </div>
                    <div class="schedule-items" id="schedule-items"></div>
                </div>
            </footer>

            <div class="social-links" style="position:absolute;bottom:220px;left:50%;transform:translateX(-50%);animation:fadeIn 0.8s var(--ease-spring) 1.4s both;" id="social-links"></div>
        </div>

        <!-- ════ ALERT CONTAINER ════ -->
        <div id="alert-container" class="absolute" style="top:80px;right:64px;z-index:50;display:flex;flex-direction:column;gap:12px;pointer-events:none;width:400px;"></div>
    </div>

    <script src="js/config.js?v=9"></script>
    <script src="js/twitch-api.js?v=9"></script>
    <script src="js/alerts.js?v=9"></script>
    <script src="js/chat.js?v=9"></script>
    <script src="js/widgets.js?v=9"></script>
    <script src="js/starting-soon-bg.js?v=9"></script>
    <script src="js/theme-manager.js?v=9"></script>
    <script src="js/reverb-client.js?v=9"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const frame = document.getElementById('obs-frame');
            Widgets.initViewportScale(frame);
            Widgets.initAirportClock(document.getElementById('clock'));
            Widgets.initTicker(document.querySelector('.ticker-band'), CONFIG.tickerMessages);
            Widgets.initNowPlaying(document.querySelector('.now-playing'), CONFIG.nowPlaying.track, CONFIG.nowPlaying.artist);
            Alerts.init(document.getElementById('alert-container'));

            // Build schedule (safe DOM construction — no innerHTML)
            const schedEl = document.getElementById('schedule-items');
            if (schedEl && Array.isArray(CONFIG.schedule)) {
                CONFIG.schedule.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'schedule-item' + (s.active ? '' : ' inactive');
                    const time = document.createElement('span');
                    time.className = 'schedule-time';
                    time.textContent = s.time;
                    item.appendChild(time);
                    const div = document.createElement('div');
                    div.className = 'schedule-divider';
                    item.appendChild(div);
                    const label = document.createElement('span');
                    label.className = 'schedule-label';
                    label.textContent = s.label;
                    item.appendChild(label);
                    schedEl.appendChild(item);
                });
            }

            // Build social links (safe DOM construction — no innerHTML)
            const socialEl = document.getElementById('social-links');
            const iconMap = { twitch: 'ph:twitch-logo', twitter: 'ph:x-logo', youtube: 'ph:youtube-logo', discord: 'ph:discord-logo' };
            const isSafeUrl = (u) => { try { const x = new URL(u, window.location.href); return x.protocol === 'http:' || x.protocol === 'https:'; } catch { return false; } };
            if (socialEl && Array.isArray(CONFIG.socials)) {
                CONFIG.socials.forEach(s => {
                    const a = document.createElement('a');
                    a.className = 'social-link';
                    a.href = isSafeUrl(s.url) ? s.url : '#';
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    const icon = document.createElement('iconify-icon');
                    icon.setAttribute('icon', iconMap[s.platform] || 'ph:link');
                    icon.setAttribute('width', '16');
                    a.appendChild(icon);
                    a.appendChild(document.createTextNode(' ' + (s.label ?? '')));
                    socialEl.appendChild(a);
                });
            }

            // Cycle fake init status messages (endless)
            const initStatusEl = document.getElementById('init-status');
            if (initStatusEl) {
                const STATUSES = [
                    'CONNEXION AUX SERVEURS',
                    'SYNCHRONISATION DES ALERTES',
                    'CHARGEMENT DES ÉMOTICÔNES',
                    'CALIBRAGE DU FLUX VIDÉO',
                    'NÉGOCIATION WEBSOCKET',
                    'PRÉPARATION DU CHAT',
                    'VÉRIFICATION DE L\'ENCODEUR',
                    'MISE EN CACHE DES ASSETS',
                    'AUTHENTIFICATION TWITCH',
                    'OPTIMISATION DU BITRATE',
                ];
                let i = 0;
                setInterval(() => {
                    initStatusEl.style.opacity = '0';
                    setTimeout(() => {
                        i = (i + 1) % STATUSES.length;
                        initStatusEl.textContent = STATUSES[i];
                        initStatusEl.style.opacity = '1';
                    }, 350);
                }, 2400);
            }

            // Initialize animated background (URL ?bg=X overrides config for testing)
            const bgParam = new URLSearchParams(window.location.search).get('bg');
            StartingSoonBg.apply(bgParam || CONFIG.startingSoonBgStyle || 'aurora');

            TwitchAPI.init();
            ReverbClient.init();
            ReverbClient.fetchSettings();
            ReverbClient.startTickerLiveRefresh();
            ReverbClient.startSettingsLiveRefresh();
        });
    </script>
</body>
</html>
