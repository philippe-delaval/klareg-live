<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klareg — Gaming</title>
    <link rel="stylesheet" href="style/base.css?v=7">
    <link rel="stylesheet" href="style/widgets.css?v=7">
    <link rel="stylesheet" href="style/animations.css?v=7">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
    <div class="obs-frame" id="obs-frame">
        <!-- ════ TRANSPARENT GAME CAPTURE ZONE ════ -->
        <!-- Full-screen transparent area — OBS game capture shows through -->

        <!-- ════ OVERLAY HUD ════ -->
        <!-- Top-Right: Compact HUD -->
        <div class="absolute flex items-center gap-3" style="top:20px;right:24px;z-index:30;animation:fadeIn 0.6s var(--ease-spring) 0.3s both;">
            <div class="viewer-count panel px-4 py-2" style="padding:6px 14px;">
                <iconify-icon icon="ph:eye" width="14" class="viewer-icon"></iconify-icon>
                <span class="viewer-number">0</span>
            </div>
            <div class="live-badge">
                <div class="pulse-dot"></div>
                <span class="live-text">LIVE</span>
                <span class="uptime">00h00</span>
            </div>
            <div class="panel" style="padding:5px 10px;">
                <div class="airport-clock" id="clock"></div>
            </div>
        </div>

        <!-- Bottom-Left: Webcam (small) -->
        <div class="absolute" style="bottom:56px;left:24px;z-index:30;animation:slideUpIn 0.8s var(--ease-spring) 0.5s both;">
            <div class="webcam-frame" style="width:240px;height:180px;border-radius:var(--radius);">
                <div class="webcam-cutout"></div>
                <div class="cam-border" style="border-radius:var(--radius);"></div>
                <div class="bracket-tl"></div>
                <div class="bracket-tr"></div>
                <div class="bracket-bl"></div>
                <div class="bracket-br"></div>
            </div>
            <!-- Channel watermark -->
            <div class="flex items-center gap-2" style="margin-top:6px;">
                <img src="klareg-logo.png" alt="Klareg" style="width:16px;height:16px;object-fit:contain;">
                <span class="font-display text-muted uppercase" style="font-size:10px;letter-spacing:0.15em;">Klareg</span>
            </div>
        </div>

        <!-- Bottom-Right: Compact Chat (semi-transparent) -->
        <div class="absolute" style="bottom:56px;right:24px;z-index:30;width:320px;animation:slideUpIn 0.8s var(--ease-spring) 0.6s both;">
            <div class="chat-panel" style="height:360px;background:rgba(19,19,24,0.75);backdrop-filter:blur(8px);">
                <div class="chat-header">
                    <span class="chat-header-title">Chat</span>
                </div>
                <div class="chat-messages" id="chat-messages" style="opacity:0.85;"></div>
            </div>
        </div>

        <!-- Left Side: Sub Goal + Last Alert -->
        <div class="absolute flex flex-col gap-3" style="top:50%;left:24px;transform:translateY(-50%);z-index:30;width:200px;animation:slideRightIn 0.8s var(--ease-spring) 0.7s both;">
            <div class="goal-bar">
                <div class="goal-header">
                    <span class="goal-label">Objectif Subs</span>
                    <span class="goal-numbers"><span class="goal-current">0</span>/<span class="goal-target">200</span></span>
                </div>
                <div class="goal-track"><div class="goal-fill" style="width:0%"></div></div>
            </div>
            <div class="recent-events" id="recent-events"></div>
        </div>

        <!-- Bottom: Thin Ticker -->
        <div class="absolute" style="bottom:0;left:0;right:0;z-index:30;animation:slideUpIn 0.5s var(--ease-spring) 0.8s both;">
            <div class="ticker-band" style="height:36px;">
                <div class="ticker-accent" style="width:28px;"><iconify-icon icon="ph:rss" width="14"></iconify-icon></div>
                <div class="ticker-content">
                    <div class="ticker-fade-left"></div>
                    <div class="ticker-fade-right"></div>
                    <div class="ticker-track" id="ticker"></div>
                </div>
            </div>
        </div>

        <!-- ════ ALERTS ════ -->
        <div id="alert-container" class="absolute" style="top:60px;right:360px;z-index:50;display:flex;flex-direction:column;gap:12px;pointer-events:none;width:360px;"></div>
    </div>

    <script src="js/config.js?v=7"></script>
    <script src="js/twitch-api.js?v=7"></script>
    <script src="js/alerts.js?v=7"></script>
    <script src="js/chat.js?v=7"></script>
    <script src="js/widgets.js?v=7"></script>
    <script src="js/reverb-client.js?v=7"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const frame = document.getElementById('obs-frame');
            Widgets.initViewportScale(frame);
            Widgets.initAirportClock(document.getElementById('clock'));
            Widgets.initLiveBadge(document.querySelector('.live-badge'));
            Widgets.initViewerCount(document.querySelector('.viewer-count'), 1834);
            Widgets.initTicker(document.querySelector('.ticker-band'), CONFIG.tickerMessages);
            Widgets.initGoalBar(document.querySelector('.goal-bar'), CONFIG.subGoal.current, CONFIG.subGoal.target, CONFIG.subGoal.label);
            Alerts.init(document.getElementById('alert-container'));
            Chat.init(document.getElementById('chat-messages'));

            TwitchAPI.init();
            ReverbClient.init();
            ReverbClient.fetchSettings();
            ReverbClient.startTickerLiveRefresh();
            ReverbClient.startSettingsLiveRefresh();
        });
    </script>
</body>
</html>
