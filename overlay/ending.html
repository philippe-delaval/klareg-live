<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klareg — Ending</title>
    <link rel="stylesheet" href="style/base.css?v=9">
    <link rel="stylesheet" href="style/theme-studio.css?v=9">
    <link rel="stylesheet" href="style/widgets.css?v=9">
    <link rel="stylesheet" href="style/animations.css?v=9">
    <link rel="stylesheet" href="style/starting-soon-bg.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600&family=Inter:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
    <div class="obs-frame" id="obs-frame" data-bg-style="none">
        <!-- ════ BACKGROUND ════ -->
        <div class="bg-grid" style="animation:gridShift 25s linear infinite;opacity:0.03;"></div>
        <div class="bg-hex" style="opacity:0.06;"></div>
        <div class="bg-scanlines" style="opacity:0.04;"></div>
        <div class="bg-vignette"></div>

        <!-- ════ ANIMATED BG VARIANTS (one active via [data-bg-style]) ════ -->
        <div class="bg-anim bg-anim-aurora">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="bg-radar-inner"></div>
            <div class="aurora-particles"></div>
        </div>
        <div class="bg-anim bg-anim-warp"><div class="warp-stars"></div></div>
        <div class="bg-anim bg-anim-constellation"><canvas id="constellation-canvas"></canvas></div>
        <div class="bg-anim bg-anim-mission">
            <div class="mission-ring mission-ring-1"></div>
            <div class="mission-ring mission-ring-2"></div>
            <div class="mission-ring mission-ring-3"></div>
            <div class="mission-crosshair"></div>
            <div class="mission-scan"></div>
            <div class="mission-telemetry mission-telemetry-tl" id="telemetry-tl"></div>
            <div class="mission-telemetry mission-telemetry-tr" id="telemetry-tr"></div>
            <div class="mission-telemetry mission-telemetry-bl" id="telemetry-bl"></div>
            <div class="mission-telemetry mission-telemetry-br" id="telemetry-br"></div>
        </div>
        <div class="bg-anim bg-anim-synthwave">
            <div class="synth-stars"></div>
            <div class="synth-sun"></div>
            <div class="synth-grid"></div>
        </div>

        <!-- ════ CONTENT ════ -->
        <div class="absolute inset-0 flex" style="z-index:20;">

            <!-- ── LEFT: Main Outro ── -->
            <div class="flex flex-col justify-center flex-grow" style="padding:64px 48px;">

                <!-- Channel Logo -->
                <div class="channel-logo" style="margin-bottom:32px;animation:fadeIn 0.8s var(--ease-spring) 0.2s both;">
                    <img src="klareg-logo.png" alt="Klareg" style="width:56px;height:56px;object-fit:contain;">
                    <span class="channel-logo-name">Klareg</span>
                </div>

                <!-- Thanks -->
                <h1 class="font-display" style="font-size:72px;font-weight:500;line-height:1.1;letter-spacing:-0.02em;color:var(--c-text-bright);text-transform:uppercase;animation:clipRevealH 1s var(--ease-spring) 0.4s both;">
                    Merci d'avoir<br>regardé
                </h1>

                <p class="text-muted" style="font-size:15px;margin-top:16px;max-width:500px;animation:fadeIn 0.6s var(--ease-spring) 0.8s both;">
                    Chaque follow, sub et bit compte énormément. À la prochaine !
                </p>

                <!-- Stats Grid -->
                <div class="stats-grid" style="margin-top:40px;max-width:700px;">
                    <div class="stat-card" style="animation:staggerFadeIn 0.6s var(--ease-spring) 1s both;">
                        <div class="stat-value" data-count="3847">0</div>
                        <div class="stat-label">Spectateurs totaux</div>
                    </div>
                    <div class="stat-card" style="animation:staggerFadeIn 0.6s var(--ease-spring) 1.1s both;">
                        <div class="stat-value" data-count="156">0</div>
                        <div class="stat-label">Nouveaux Follows</div>
                    </div>
                    <div class="stat-card" style="animation:staggerFadeIn 0.6s var(--ease-spring) 1.2s both;">
                        <div class="stat-value" data-count="23">0</div>
                        <div class="stat-label">Nouveaux Subs</div>
                    </div>
                    <div class="stat-card" style="animation:staggerFadeIn 0.6s var(--ease-spring) 1.3s both;">
                        <div class="stat-value" data-count="4" data-suffix="h">0</div>
                        <div class="stat-label">Durée</div>
                    </div>
                </div>

                <!-- Top Supporters -->
                <div class="panel" style="margin-top:32px;max-width:700px;animation:staggerFadeIn 0.6s var(--ease-spring) 1.5s both;">
                    <div class="flex items-center justify-between" style="padding:12px 20px;border-bottom:1px solid var(--c-border);">
                        <span class="font-display uppercase" style="font-size:11px;letter-spacing:0.15em;color:var(--c-text-bright);">Top Supporteurs</span>
                        <iconify-icon icon="ph:trophy" width="16" style="color:var(--c-gold)"></iconify-icon>
                    </div>
                    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:10px;">
                        <div class="flex items-center gap-4">
                            <span class="font-display" style="font-size:16px;color:var(--c-gold);width:24px;">1</span>
                            <span style="color:var(--c-text-bright);font-weight:500;">TechQueen</span>
                            <span class="text-muted" style="margin-left:auto;font-size:12px;">5,000 bits</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-display" style="font-size:16px;color:var(--c-text-muted);width:24px;">2</span>
                            <span style="color:var(--c-text-bright);font-weight:500;">CyberSamurai</span>
                            <span class="text-muted" style="margin-left:auto;font-size:12px;">T2 Sub (6mo)</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-display" style="font-size:16px;color:var(--c-text-dim);width:24px;">3</span>
                            <span style="color:var(--c-text-bright);font-weight:500;">NeonNinja</span>
                            <span class="text-muted" style="margin-left:auto;font-size:12px;">Gifted 10 subs</span>
                        </div>
                    </div>
                </div>

                <!-- Next Stream + Social -->
                <div id="next-stream-block" class="flex items-center gap-4" style="margin-top:32px;animation:fadeIn 0.6s var(--ease-spring) 1.8s both;">
                    <div class="panel px-6 py-3 flex items-center gap-3">
                        <iconify-icon icon="ph:calendar" width="16" style="color:var(--c-accent)"></iconify-icon>
                        <div class="flex flex-col">
                            <span class="font-display uppercase" style="font-size:9px;letter-spacing:0.15em;color:var(--c-text-muted);">Prochain Live</span>
                            <span id="next-stream-text" style="font-size:13px;color:var(--c-text-bright);font-weight:500;">Demain à 18h00 CET</span>
                        </div>
                    </div>
                </div>

                <div class="social-links" style="margin-top:20px;animation:fadeIn 0.6s var(--ease-spring) 2s both;" id="social-links"></div>
            </div>

            <!-- ── RIGHT: Chat ── -->
            <div style="width:360px;padding:64px 24px 64px 0;animation:slideLeftIn 0.8s var(--ease-spring) 0.5s both;">
                <div class="chat-panel" style="height:100%;">
                    <div class="chat-header">
                        <span class="chat-header-title">Chat</span>
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                </div>
            </div>
        </div>

        <!-- ════ ALERTS ════ -->
        <div id="alert-container" class="absolute" style="top:80px;right:400px;z-index:50;display:flex;flex-direction:column;gap:12px;pointer-events:none;width:360px;"></div>
    </div>

    <script src="js/config.js?v=9"></script>
    <script src="js/twitch-api.js?v=9"></script>
    <script src="js/alerts.js?v=9"></script>
    <script src="js/chat.js?v=9"></script>
    <script src="js/widgets.js?v=9"></script>
    <script src="js/starting-soon-bg.js?v=9"></script>
    <script src="js/theme-manager.js?v=9"></script>
    <script src="js/reverb-client.js?v=9"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const frame = document.getElementById('obs-frame');
            Widgets.initViewportScale(frame);
            const bgParam = new URLSearchParams(window.location.search).get('bg');
            StartingSoonBg.apply(bgParam || CONFIG.endingBgStyle || 'none');
            Alerts.init(document.getElementById('alert-container'));
            Chat.init(document.getElementById('chat-messages'));

            // Count-up animation for stats
            document.querySelectorAll('.stat-value[data-count]').forEach(el => {
                const target = parseInt(el.dataset.count);
                const suffix = el.dataset.suffix || '';
                setTimeout(() => {
                    let start = 0;
                    const startTime = performance.now();
                    const duration = 2000;
                    const step = (now) => {
                        const progress = Math.min((now - startTime) / duration, 1);
                        const eased = 1 - Math.pow(1 - progress, 3);
                        el.textContent = Math.floor(eased * target).toLocaleString() + suffix;
                        if (progress < 1) requestAnimationFrame(step);
                    };
                    requestAnimationFrame(step);
                }, 1500);
            });

            // Social links (safe DOM construction)
            const socialEl = document.getElementById('social-links');
            const iconMap = { twitch: 'ph:twitch-logo', twitter: 'ph:x-logo', youtube: 'ph:youtube-logo', discord: 'ph:discord-logo' };
            const isSafeUrl = (u) => { try { const x = new URL(u, window.location.href); return x.protocol === 'http:' || x.protocol === 'https:'; } catch { return false; } };
            if (socialEl && Array.isArray(CONFIG.socials)) {
                CONFIG.socials.forEach(s => {
                    const a = document.createElement('a');
                    a.className = 'social-link';
                    a.href = isSafeUrl(s.url) ? s.url : '#';
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    const icon = document.createElement('iconify-icon');
                    icon.setAttribute('icon', iconMap[s.platform] || 'ph:link');
                    icon.setAttribute('width', '14');
                    a.appendChild(icon);
                    a.appendChild(document.createTextNode(' ' + (s.label ?? '')));
                    socialEl.appendChild(a);
                });
            }

            TwitchAPI.init();
            ReverbClient.init();
            ReverbClient.fetchSettings();
            ReverbClient.startSettingsLiveRefresh();
        });
    </script>
</body>
</html>
