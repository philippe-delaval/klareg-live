server {
    listen 80 default_server;
    server_name _;
    root /app/public;
    index index.php index.html;

    # Overlay static files (copied to public/overlay in Dockerfile).
    location /overlay/ {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=300";
    }

    # Laravel front controller.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handler.
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60;
    }

    # Long-term cache for Vite assets.
    location ~* ^/build/.*\.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block sensitive files.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
